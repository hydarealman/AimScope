spring:
  application:
    name: aimscope-backend

  # MariaDB
  datasource:
    url: jdbc:mariadb://localhost:3306/aimscope?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: aimscope
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

  # Redis
  redis:
    host: localhost
    port: 6379

  # File upload limits
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

# InfluxDB 2.x
influxdb:
  url: http://localhost:8086
  token: aimscope-influx-token-dev-2024
  org: aimscope
  bucket: aimscope

# Server
server:
  port: 8080

# JWT
jwt:
  secret: AimScopeJwtSecretKey2026RobotDataClosedLoopPlatform
  expiration: 86400000  # 24 hours

# File storage
aimscope:
  storage:
    upload-dir: ./uploads
    replay-dir: ./uploads/replays
    configs-dir: ./configs
    scripts-dir: ./scripts/python

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info
